<nav class="navbar">
  <div class="nav-brand">
    <a routerLink="/">
      <img src="/fomo-logo.svg" alt="FOMO logo" class="brand-logo" />
    </a>
  </div>

  <div class="nav-right">
    <a routerLink="/user/profile" class="nav-back-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
      </svg>
      <span>Voltar ao Perfil</span>
    </a>
  </div>
</nav>

<div class="tickets-page-wrapper min-h-screen p-6 md:p-10">
  <div class="max-w-4xl mx-auto space-y-8 animate-fade">
    
    <header class="flex justify-between items-end border-b border-white/10 pb-6">
      <div class="space-y-1">
        <h1 class="text-3xl font-black text-white tracking-tight">Meus Bilhetes</h1>
        <p class="text-zinc-400 text-sm font-medium">Acesso rápido aos teus próximos eventos.</p>
      </div>
      <div class="hidden md:block">
        <span class="px-4 py-2 bg-purple-500/20 text-purple-400 text-[10px] font-black tracking-widest rounded-full uppercase">
          {{ tickets.length }} Ativos
        </span>
      </div>
    </header>

    <div *ngIf="isLoading" class="flex flex-col items-center justify-center py-20 space-y-4">
      <div class="w-10 h-10 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
      <p class="text-zinc-400 font-bold text-sm">A procurar os teus bilhetes...</p>
    </div>

    <div *ngIf="!isLoading && tickets.length === 0" class="flex flex-col items-center justify-center py-20 space-y-4 text-center">
      <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center text-zinc-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" /></svg>
      </div>
      <p class="text-white font-bold">Ainda não tens bilhetes</p>
      <button routerLink="/events" class="px-6 py-3 bg-white text-black font-black text-xs uppercase tracking-widest rounded-xl">Explorar Eventos</button>
    </div>

    <div *ngIf="!isLoading && tickets.length > 0" class="grid gap-8">
      <div *ngFor="let ticket of tickets" class="ticket-card animate-fade-up">
        <div class="ticket-info">
           <h2 class="text-2xl font-black text-zinc-900 mb-6">{{ ticket.eventName }}</h2>
           <div class="grid grid-cols-2 gap-6">
             <p class="text-sm text-zinc-600"><strong>Data:</strong> {{ ticket.eventDate | date:'dd MMM, HH:mm' }}</p>
             <p class="text-sm text-zinc-600"><strong>Local:</strong> {{ ticket.location }}</p>
           </div>
        </div>
        <div class="ticket-qr">
          <div class="bg-white p-4 rounded-2xl mb-4">
            <img [src]="getQrCodeUrl(ticket.qrCode)" class="w-32 h-32">
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
