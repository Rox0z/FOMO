version: '3.8'

services:
  # 1. Base de Dados PostgreSQL Isolada
  postgres-db:
    image: postgres:15-alpine
    container_name: fomo-postgres
    environment:
      POSTGRES_USER: fomo
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: fomo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fomo -d fomo"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. API Backend (NestJS)
  backend:
    build:
      context: ./backend
    container_name: fomo-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env 
    depends_on:
      postgres-db:
        condition: service_healthy
  # 3. Interface Frontend (Angular)
  frontend:
    build:
      context: ./frontend
    container_name: fomo-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data: # Garante que os dados da BD não se apagam quando fechas o Docker